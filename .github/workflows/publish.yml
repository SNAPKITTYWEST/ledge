name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust + wasm-pack
        uses: dtolnay/rust-toolchain@stable
      - run: cargo install wasm-pack

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build WASM
        run: wasm-pack build --features wasm --target bundler --out-dir pkg

      - name: Build JS
        run: npm ci && npm run build:js

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
